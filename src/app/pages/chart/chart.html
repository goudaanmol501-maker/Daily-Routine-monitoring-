<div style="background:#0a0f1a; border:1px solid #1f2937;
            border-radius:16px; padding:20px; margin:16px;">

  <!-- Header -->
  <div style="display:flex; justify-content:space-between;
              align-items:flex-start; margin-bottom:16px;">

    <!-- Stats -->
    <div>
      <div style="font-size:28px; font-weight:700;
                  color:#f9fafb; font-family:'Courier New';">
        {{ avgPercent }}%
      </div>
      <div style="font-size:11px; color:#6b7280;
                  letter-spacing:2px; font-family:'Courier New';">
        AVG COMPLETION — {{ getRangeLabel() }}
      </div>
    </div>

    <!-- Trend badge -->
    <div style="display:flex; align-items:center; gap:4px;
                padding:4px 10px; border-radius:20px;
                font-size:12px; font-weight:700;
                font-family:'Courier New'; letter-spacing:1px;"
         [style.color]="getTrendColor()"
         [style.background]="trend > 0
           ? 'rgba(74,222,128,0.1)'
           : trend < 0
           ? 'rgba(248,113,113,0.1)'
           : 'rgba(107,114,128,0.1)'"
         [style.border]="'1px solid ' + getTrendColor() + '40'">
      {{ getTrendLabel() }}
    </div>

  </div>

  <!-- Chart -->
  <div #chartEl></div>

  <!-- Footer -->
  <div style="display:flex; justify-content:space-between;
              align-items:center; margin-top:16px;
              padding-top:16px; border-top:1px solid #1f2937;">

    <!-- Dropdown -->
    <div style="position:relative;">
      <button
        (click)="showDropdown = !showDropdown"
        style="background:none; border:none; cursor:pointer;
               color:#6b7280; font-family:'Courier New';
               font-size:11px; letter-spacing:1px;
               display:flex; align-items:center; gap:6px;">
        {{ getRangeLabel() }}
        <svg width="12" height="12" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2">
          <path d="m19 9-7 7-7-7"/>
        </svg>
      </button>

      <!-- Dropdown menu -->
      @if (showDropdown) {
        <div style="position:absolute; bottom:28px; left:0;
                    background:#111827; border:1px solid #1f2937;
                    border-radius:10px; padding:6px;
                    z-index:50; min-width:140px;
                    box-shadow: 0 8px 24px rgba(0,0,0,0.4);">
          @for (opt of rangeOptions; track opt.value) {
            <button
              (click)="selectRange(opt.value, opt.label)"
              style="display:block; width:100%; text-align:left;
                     padding:8px 12px; border:none; cursor:pointer;
                     font-family:'Courier New'; font-size:11px;
                     letter-spacing:1px; border-radius:6px;
                     transition:all 0.15s;"
              [style.background]="selectedRange === opt.value
                ? 'rgba(27,188,216,0.15)' : 'transparent'"
              [style.color]="selectedRange === opt.value
                ? '#1bbcd8' : '#9ca3af'">
              {{ opt.label }}
            </button>
          }
        </div>
      }
    </div>

    <!-- Legend -->
    <div style="display:flex; gap:12px; font-size:10px;
                font-family:'Courier New'; letter-spacing:1px;">
      <span style="color:#f87171;">■ LOW &lt;40%</span>
      <span style="color:#facc15;">■ MED 40-89%</span>
      <span style="color:#4ade80;">■ HIGH 90%+</span>
    </div>

  </div>

</div>
